<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080810}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;color:#d0d0e8;-webkit-user-select:none;user-select:none;touch-action:manipulation}
#app{width:100%;height:100%;position:relative;overflow:hidden}

/* BG particles */
#bg-canvas{position:absolute;inset:0;z-index:0}

/* Aura (behind 3D) */
.aura{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;transition:background 1.2s ease;z-index:1}
.aura-1{width:45vmin;height:55vmin;background:radial-gradient(ellipse,rgba(249,115,22,.2),transparent 70%);filter:blur(40px);animation:ad1 5s ease-in-out infinite}
.aura-2{width:65vmin;height:75vmin;background:radial-gradient(ellipse,rgba(249,115,22,.08),transparent 70%);filter:blur(60px);animation:ad2 7s ease-in-out infinite}
@keyframes ad1{0%,100%{transform:translate(-50%,-50%) scale(1)}33%{transform:translate(-47%,-52%) scale(1.04)}66%{transform:translate(-53%,-48%) scale(.97)}}
@keyframes ad2{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-53%,-47%) scale(1.05)}}
.state-listening .aura-1{background:radial-gradient(ellipse,rgba(34,211,238,.3),transparent 70%)}
.state-listening .aura-2{background:radial-gradient(ellipse,rgba(34,211,238,.12),transparent 70%)}
.state-thinking .aura-1{background:radial-gradient(ellipse,rgba(168,85,247,.25),transparent 70%)}
.state-speaking .aura-1{background:radial-gradient(ellipse,rgba(251,146,60,.35),transparent 70%)}
.state-happy .aura-1{background:radial-gradient(ellipse,rgba(250,204,21,.3),transparent 70%)}
.state-party .aura-1{background:radial-gradient(ellipse,rgba(236,72,153,.4),transparent 70%);animation:ad1 2s ease-in-out infinite}
.state-party .aura-2{background:radial-gradient(ellipse,rgba(168,85,247,.25),transparent 70%);animation:ad2 2.5s ease-in-out infinite}

/* 3D canvas with oval mask — responsive */
#avatar-canvas{position:absolute;inset:0;z-index:2;pointer-events:none;mask-image:radial-gradient(ellipse 48% 42% at 50% 42%,black 75%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 48% 42% at 50% 42%,black 75%,transparent 100%)}
@media (orientation:portrait){#avatar-canvas{mask-image:radial-gradient(ellipse 55% 35% at 50% 38%,black 75%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 55% 35% at 50% 38%,black 75%,transparent 100%)}}

/* Loading */
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;color:rgba(200,200,230,.6);font-size:16px;text-align:center;transition:opacity .8s}
#loading.hidden{opacity:0;pointer-events:none}
.load-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin:12px auto 0;overflow:hidden}
.load-fill{height:100%;background:rgba(249,115,22,.6);border-radius:2px;transition:width .3s}

/* Chat */
#chat-area{position:absolute;bottom:115px;left:4%;right:4%;display:flex;flex-direction:column;gap:8px;max-height:35vh;overflow:hidden;pointer-events:none;z-index:10}
.msg{padding:10px 16px;border-radius:18px;font-size:15px;line-height:1.5;max-width:85%;opacity:0;animation:mi .4s ease-out forwards;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.msg.user{align-self:flex-end;background:rgba(99,102,241,.25);border:1px solid rgba(99,102,241,.35);border-bottom-right-radius:4px}
.msg.alice{align-self:flex-start;background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.25);border-bottom-left-radius:4px}
.msg.fading{animation:mo 1.5s ease-in forwards}
@keyframes mi{from{opacity:0;transform:translateY(15px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes mo{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* Controls */
#controls{position:absolute;bottom:max(15px,env(safe-area-inset-bottom,15px));left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:20;width:90%;max-width:400px}
#voice-btn{width:60px;height:60px;border-radius:50%;background:rgba(249,115,22,.12);border:2px solid rgba(249,115,22,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative;-webkit-tap-highlight-color:transparent}
#voice-btn:active{transform:scale(.92)}
#voice-btn.active{background:rgba(34,211,238,.15);border-color:rgba(34,211,238,.6);box-shadow:0 0 35px rgba(34,211,238,.3)}
#voice-btn svg{width:24px;height:24px}
#voice-btn svg path{fill:rgba(249,115,22,.75);transition:fill .3s}
#voice-btn.active svg path{fill:rgba(34,211,238,.9)}
.ripple{position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(34,211,238,.35);animation:rp 2s ease-out infinite;pointer-events:none}
.ripple:nth-child(2){animation-delay:.6s}.ripple:nth-child(3){animation-delay:1.2s}
@keyframes rp{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.5);opacity:0}}
#text-row{display:flex;gap:6px;width:100%;opacity:.5;transition:opacity .3s}
#text-row:focus-within{opacity:1}
#text-input{flex:1;padding:10px 16px;border-radius:24px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#d0d0e8;font-size:14px;outline:none}
#text-input::placeholder{color:rgba(200,200,230,.3)}
#text-input:focus{border-color:rgba(249,115,22,.4);background:rgba(255,255,255,.08)}
#send-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(249,115,22,.3);background:rgba(249,115,22,.1);color:rgba(249,115,22,.8);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#hint{font-size:12px;color:rgba(200,200,230,.35);text-align:center;min-height:16px}
#hint.bright{color:rgba(200,200,230,.7)}

/* Info widget — single consolidated panel */
#info-widget{position:absolute;top:12px;right:12px;padding:8px 12px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:8px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-size:11px;font-family:'SF Mono',Menlo,monospace;color:rgba(165,180,252,.55);pointer-events:none;z-index:5;opacity:0;animation:hi 1s ease-out .5s forwards;line-height:1.6;white-space:nowrap}
#status-dot{position:absolute;bottom:12px;left:12px;font-size:11px;font-family:'SF Mono',Menlo,monospace;color:rgba(165,180,252,.45);pointer-events:none;z-index:5;opacity:0;animation:hi 1s ease-out .8s forwards}
#avatar-switcher{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:6px;z-index:20;opacity:0;animation:hi 1s ease-out 1s forwards}
.av-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(165,180,252,.2);background:rgba(99,102,241,.08);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .3s;-webkit-tap-highlight-color:transparent}
.av-btn:hover,.av-btn.active{border-color:rgba(249,115,22,.6);background:rgba(249,115,22,.15)}
.av-btn:active{transform:scale(.9)}
@keyframes hi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<div id="app" class="state-idle">
  <canvas id="bg-canvas"></canvas>

  <div id="controls">

      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>

<div id="err-display" style="position:fixed;top:0;left:0;right:0;z-index:999;background:#300;color:#f88;font:12px monospace;padding:8px;display:none;max-height:40vh;overflow:auto"></div>
</div>

<script>
window.onerror=(m,s,l,c,e)=>{const d=document.getElementById('err-display');d.style.display='block';d.textContent+=(e&&e.stack?e.stack:m)+' @ '+s+':'+l+'\n';};
window.addEventListener('unhandledrejection',e=>{const d=document.getElementById('err-display');d.style.display='block';d.textContent+='Promise: '+(e.reason&&e.reason.stack||e.reason)+'\n';});

<script type="module" crossorigin="anonymous">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ===== CONFIG ===== */
const API=''; // relative URL — works through tunnel and locally
// Available avatars
const AVATARS=[
  {id:'e', name:'E', icon:'🌸', url:'alice-e.vrm', flip:false},
  {id:'a', name:'A', icon:'🍊', url:'https://raw.githubusercontent.com/madjin/vrm-samples/master/vroid/stable/AvatarSample_A.vrm', flip:true},
  {id:'b', name:'B', icon:'💜', url:'https://raw.githubusercontent.com/madjin/vrm-samples/master/vroid/stable/AvatarSample_B.vrm', flip:true},
];
let currentAvatarIdx=0;
const MODEL_PRIMARY=AVATARS[0].url;
const MODEL_FALLBACK=AVATARS[1].url;
const VOICE_LANG='ru-RU';
const PARTICLE_COUNT=40;
const CHAT_FADE=9000;
const SC={idle:{h:25,s:90,l:55},listening:{h:187,s:80,l:55},thinking:{h:270,s:65,l:60},speaking:{h:28,s:95,l:60},happy:{h:45,s:90,l:55},party:{h:320,s:85,l:60}};
const CLOCKS=[
  {id:'cy',label:'Кипр',tz:'Europe/Nicosia'},
  {id:'msk',label:'МСК',tz:'Europe/Moscow'},
  {id:'prm',label:'Пермь',tz:'Asia/Yekaterinburg'},
  {id:'eu',label:'EU',tz:'Europe/Berlin'},
];

/* ===== DOM ===== */
const $app=document.getElementById('app');
const $bgC=document.getElementById('bg-canvas');
const $avC=document.getElementById('avatar-canvas');
const $chat=document.getElementById('chat-area');
const $vBtn=document.getElementById('voice-btn');
const $tIn=document.getElementById('text-input');
const $sBtn=document.getElementById('send-btn');
const $hint=document.getElementById('hint');
// $holos removed — using single info-widget now
const $load=document.getElementById('loading');
const $loadFill=document.getElementById('load-fill');

/* ===== STATE ===== */
let curState='idle';
const stLis=[];
function setState(s){if(s===curState)return;curState=s;$app.className='state-'+s;stLis.forEach(fn=>fn(s));}

/* ===== THREE.JS SCENE ===== */
const renderer=new THREE.WebGLRenderer({canvas:$avC,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const camera=new THREE.PerspectiveCamera(innerHeight>innerWidth?28:22,innerWidth/innerHeight,0.1,20);
camera.position.set(0,1.35,0.75);
camera.lookAt(0,1.30,0);

const scene=new THREE.Scene();

// Lighting — cinematic 3-point
const keyLight=new THREE.DirectionalLight(0xffeedd,2.5);
keyLight.position.set(1,1.5,1.5);scene.add(keyLight);
const fillLight=new THREE.DirectionalLight(0xaabbff,1.0);
fillLight.position.set(-1,1,0.5);scene.add(fillLight);
const rimLight=new THREE.DirectionalLight(0xff8844,1.5);
rimLight.position.set(0,1,-1);scene.add(rimLight);
const ambLight=new THREE.AmbientLight(0x443355,0.5);scene.add(ambLight);

// No floor needed for face close-up

/* ===== VRM LOADING ===== */
let vrm=null;
const clock=new THREE.Clock();
const loader=new GLTFLoader();
loader.crossOrigin='anonymous';
loader.register(p=>new VRMLoaderPlugin(p));

function initVRM(gltf, flip=false){
    vrm=gltf.userData.vrm;
    vrm.scene.traverse(o=>{o.frustumCulled=false;});
    if(flip)vrm.scene.rotation.y=Math.PI;
    scene.add(vrm.scene);
    const lookTarget=new THREE.Object3D();
    camera.add(lookTarget);scene.add(camera);
    if(vrm.lookAt)vrm.lookAt.target=lookTarget;
    const headBone=vrm.humanoid.getNormalizedBoneNode('head');
    if(headBone){
      const headPos=new THREE.Vector3();
      headBone.getWorldPosition(headPos);
      camera.position.set(0, headPos.y+0.06, 0.65);
      camera.lookAt(0, headPos.y+0.02, 0);
      console.log('[VRM] Head at y='+headPos.y.toFixed(3));
    }
    // Portrait mode: shift model down so top widgets are visible
    applyPortraitOffset();
    $load.classList.add('hidden');
    console.log('[VRM] OK! Expressions:',vrm.expressionManager?.expressions?.map(e=>e.expressionName));
    setTimeout(greet,800);
}
function applyPortraitOffset(){
    if(!vrm)return;
    const portrait=innerHeight>innerWidth;
    vrm.scene.position.y=0;
    // Shift canvas down in portrait via CSS so top widgets are visible
    const c=renderer.domElement;
    if(portrait){c.style.position='relative';c.style.top='10vh';}
    else{c.style.position='';c.style.top='';}
}

loader.load(MODEL_PRIMARY,
  gltf=>{initVRM(gltf, AVATARS[0].flip);},
  p=>{const pct=p.total?Math.round(100*p.loaded/p.total):50;$loadFill.style.width=pct+'%';},
  e=>{
    console.error('[VRM] Primary failed, trying fallback:',e);
    $loadFill.style.width='0%';
    currentAvatarIdx=1;
    loader.load(MODEL_FALLBACK,
      gltf=>{initVRM(gltf, AVATARS[1].flip);},
      p=>{const pct=p.total?Math.round(100*p.loaded/p.total):50;$loadFill.style.width=pct+'%';},
      e2=>{$load.textContent='Ошибка загрузки модели';console.error('[VRM] Fallback also failed:',e2);}
    );
  }
);

/* ===== GAME-STYLE ANIMATION SYSTEM ===== */

// Smoothed animation values (current → target via lerp)
// three-vrm v3 maps VRM0→VRM1 names: a→aa, o→oh, joy→happy, sorrow→sad
const A={headY:0,headX:0,headZ:0,neckY:0,neckX:0,chestX:0,spineX:0,happy:0,sad:0,aa:0,oh:0,ih:0,blink:0};
const AT={...A};

let audioLevel=0,tgtAudio=0,musicDetectTimer=0,musicFadeTimer=0;

/* -- Idle micro-actions: wink, glance, smile, head tilt -- */
let idleAction=null,idleActionEnd=0,nextIdleAction=3+Math.random()*4;
const IDLE_ACTIONS=['glanceL','glanceR','smile','headTilt','lookUp','deepBreath'];
function pickIdleAction(t){
  if(curState!=='idle')return;
  const a=IDLE_ACTIONS[Math.random()*IDLE_ACTIONS.length|0];
  idleAction=a;
  idleActionEnd=t+(a==='deepBreath'?2.5:a==='smile'?2:1.2);
  nextIdleAction=idleActionEnd+3+Math.random()*5;
}

function updateAnimTargets(t){
  const al=audioLevel;
  // Trigger idle micro-actions
  if(curState==='idle'&&t>=nextIdleAction&&!idleAction)pickIdleAction(t);
  if(idleAction&&t>=idleActionEnd)idleAction=null;

  switch(curState){
    case'idle':
      // Base breathing motion
      AT.headY=Math.sin(t*.29)*.06+Math.sin(t*.53)*.03;
      AT.headX=Math.sin(t*.37)*.04+Math.sin(t*.71)*.02;
      AT.headZ=Math.sin(t*.43)*.025;
      AT.neckY=Math.sin(t*.23)*.02;
      AT.neckX=Math.sin(t*.31)*.015;
      AT.chestX=Math.sin(t*1.5)*.018;
      AT.spineX=Math.sin(t*1.5)*.008;
      AT.happy=0;AT.sad=0;AT.aa=0;AT.oh=0;AT.ih=0;
      // Overlay micro-actions
      if(idleAction){
        const dur=idleAction==='deepBreath'?2.5:idleAction==='smile'?2:1.2;
        const p=1-Math.max(0,(idleActionEnd-t)/dur);
        const ease=p<.3?p/.3:p>.7?(1-p)/.3:1; // fade in/out
        switch(idleAction){
          case'glanceL':AT.headY+=.12*ease;AT.neckY+=.03*ease;break;
          case'glanceR':AT.headY-=.12*ease;AT.neckY-=.03*ease;break;
          case'smile':AT.happy=.3*ease;AT.headZ+=.02*ease;break;
          case'headTilt':AT.headZ+=.06*ease;AT.neckX+=.02*ease;break;
          case'lookUp':AT.headX+=.06*ease;AT.neckX+=.02*ease;break;
          case'deepBreath':AT.chestX+=.03*ease;AT.spineX+=.015*ease;AT.headX+=.02*ease;break;
        }
      }
      break;
    case'listening':
      // Attentive, focused — no smile, slight lean forward
      AT.headY=Math.sin(t*.35)*.04+.06;
      AT.headX=-.06+Math.sin(t*.5)*.02;
      AT.headZ=.04+Math.sin(t*.4)*.015;
      AT.neckY=.02;AT.neckX=-.02;
      AT.chestX=Math.sin(t*1.5)*.015;AT.spineX=Math.sin(t*1.5)*.007;
      AT.happy=0;AT.sad=0;AT.aa=0;AT.oh=0;AT.ih=0;
      break;
    case'thinking':
      // Concentrated, looking away
      AT.headY=-.1+Math.sin(t*.2)*.03;
      AT.headX=.04+Math.sin(t*.25)*.02;
      AT.headZ=-.04;
      AT.neckY=-.03;AT.neckX=.02;
      AT.chestX=Math.sin(t*1.5)*.012;AT.spineX=Math.sin(t*1.5)*.006;
      AT.happy=0;AT.sad=0;AT.aa=0;AT.oh=0;AT.ih=0;
      break;
    case'speaking':
      // Expression matches mood of what she's saying
      AT.headY=Math.sin(t*.7)*.06;
      AT.headX=Math.sin(t*2)*al*.07+Math.sin(t*.4)*.02;
      AT.headZ=Math.sin(t*1.2)*al*.04;
      AT.neckY=Math.sin(t*.5)*.02;AT.neckX=Math.sin(t*.7)*al*.02;
      AT.chestX=Math.sin(t*1.5)*.02;AT.spineX=Math.sin(t*1.5)*.01;
      AT.happy=replyMood==='happy'?.4:0;
      AT.sad=replyMood==='sad'?.3:0;
      AT.aa=Math.min(1,al*3)*.9;
      AT.oh=Math.min(1,al*2)*.5;
      AT.ih=Math.min(1,al*1.5)*.3;
      break;
    case'happy':
      // Only enters this state for genuinely warm/funny replies
      AT.headY=Math.sin(t*.6)*.08;
      AT.headX=-.04+Math.sin(t*.8)*.04;
      AT.headZ=Math.sin(t*.9)*.03;
      AT.neckY=Math.sin(t*.5)*.03;AT.neckX=-.01;
      AT.chestX=Math.sin(t*1.5)*.02;AT.spineX=Math.sin(t*1.5)*.01;
      AT.happy=.7;AT.sad=0;AT.aa=0;AT.oh=0;AT.ih=0;
      break;
    case'party':
      // Head bobs to beat, body sways
      const bass=getBassLvl();
      const beat=bass>.25?1:0;
      AT.headX=-.06+beat*.1+Math.sin(t*3)*.03;
      AT.headY=Math.sin(t*2)*.1;
      AT.headZ=Math.sin(t*1.5)*.05;
      AT.neckY=Math.sin(t*2.5)*.04;AT.neckX=Math.sin(t*3)*.03;
      AT.chestX=Math.sin(t*3)*.04+beat*.02;
      AT.spineX=Math.sin(t*2.5)*.025;
      AT.happy=0;AT.sad=0;
      AT.aa=0;AT.oh=beat*.15;AT.ih=0;
      break;
  }
}

function applyAnim(delta){
  // Exponential lerp (game-standard smoothing)
  const sp=1-Math.pow(.001,delta); // ~0.06 at 60fps
  for(const k in A)A[k]+=(AT[k]-A[k])*sp;

  if(!vrm)return;

  // Bones
  const head=vrm.humanoid.getNormalizedBoneNode('head');
  const neck=vrm.humanoid.getNormalizedBoneNode('neck');
  const chest=vrm.humanoid.getNormalizedBoneNode('chest');
  const spine=vrm.humanoid.getNormalizedBoneNode('spine');
  if(head){head.rotation.y=A.headY;head.rotation.x=A.headX;head.rotation.z=A.headZ;}
  if(neck){neck.rotation.y=A.neckY;neck.rotation.x=A.neckX;}
  if(chest)chest.rotation.x=A.chestX;
  if(spine)spine.rotation.x=A.spineX;

  // Expressions
  const em=vrm.expressionManager;
  if(em){
    em.setValue('happy',A.happy);
    em.setValue('sad',A.sad);
    em.setValue('aa',A.aa);
    em.setValue('oh',A.oh);
    em.setValue('ih',A.ih);
    em.setValue('blink',A.blink);
  }
}

/* -- Blink system -- */
let blinkPh=0,nextBlink=2;
function updateBlink(t,delta){
  // Skip normal blink during wink actions
  if(blinkPh===0){if(t>=nextBlink)blinkPh=1;}
  else if(blinkPh===1){AT.blink=Math.min(1,AT.blink+delta*12);if(AT.blink>=1){AT.blink=1;blinkPh=2;}}
  else if(blinkPh===2){AT.blink=Math.max(0,AT.blink-delta*10);if(AT.blink<=0){AT.blink=0;blinkPh=0;nextBlink=t+(Math.random()<.15?.3:2+Math.random()*4);}}
  if(curState==='listening'&&blinkPh===0)nextBlink=Math.max(nextBlink,t+3);
}

/* ===== PARTICLES (bg-canvas) ===== */
const bgCtx=$bgC.getContext('2d');
let bgW,bgH,particles=[];const smC={h:25,s:90,l:55};
function resizeBg(){const d=Math.min(devicePixelRatio,2);bgW=innerWidth;bgH=innerHeight;$bgC.width=bgW*d;$bgC.height=bgH*d;$bgC.style.width=bgW+'px';$bgC.style.height=bgH+'px';bgCtx.setTransform(d,0,0,d,0,0);}
function spawnP(r){return{x:Math.random()*bgW,y:r?Math.random()*bgH:bgH+10,vx:(Math.random()-.5)*.3,vy:-(Math.random()*.2+.1),sz:Math.random()*2+.5,life:r?Math.random():0,ml:.7+Math.random()*.3,ho:(Math.random()-.5)*25};}
function initP(){particles=[];for(let i=0;i<PARTICLE_COUNT;i++)particles.push(spawnP(true));}
function drawP(){const sc=SC[curState]||SC.idle;smC.h+=(sc.h-smC.h)*.02;smC.s+=(sc.s-smC.s)*.02;smC.l+=(sc.l-smC.l)*.02;bgCtx.clearRect(0,0,bgW,bgH);for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life+=.002;if(p.life>=p.ml||p.y<-20)Object.assign(p,spawnP(false));const a=Math.sin(p.life/p.ml*Math.PI)*.4,h=smC.h+p.ho,s=smC.s,l=smC.l;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.sz*3,0,Math.PI*2);bgCtx.fillStyle=`hsla(${h},${s}%,${l}%,${a*.1})`;bgCtx.fill();bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.sz,0,Math.PI*2);bgCtx.fillStyle=`hsla(${h},${s}%,${l+20}%,${a})`;bgCtx.fill();}}

/* ===== VOICE ===== */
let recognition=null,synth=(typeof speechSynthesis!=='undefined'?speechSynthesis:null),selVoice=null,isLis=false,isSpk=false;
let audioCtx=null,analyser=null,micStream=null,speakT0=0;
function initRec(){const ua=navigator.userAgent||'';
const noGoogle=/huawei|harmonyos|hmscore/i.test(ua);
const SR=!noGoogle&&(window.SpeechRecognition||window.webkitSpeechRecognition);
if(!SR){console.warn('[STT] No Web Speech API or no Google — using Whisper');useWhisperSTT=true;return;}recognition=new SR();recognition.lang=VOICE_LANG;recognition.continuous=false;recognition.interimResults=true;
recognition.onresult=e=>{let i_='',f_='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)f_+=t;else i_+=t;}if(i_)showHint(i_,true);if(f_)handleMsg(f_.trim());};
recognition.onerror=e=>{
  if(e.error==='no-speech'){
    if(analyser&&musicDetectTimer>.3){try{recognition.start();showHint('Слушаю музыку...',true);return;}catch(e2){}}
    showHint('Не услышала...');
  }else if(e.error==='not-allowed'){showHint('Разреши микрофон');
  }else if(e.error==='network'||e.error==='service-not-allowed'||e.error==='language-not-supported'){
    // Google Speech API unavailable (Huawei etc) — switch to Whisper permanently
    console.warn('[STT] Web Speech failed, switching to Whisper');
    useWhisperSTT=true;showHint('Переключаюсь на Whisper...');
    isLis=false;stopMic();vOff();setState('idle');
    setTimeout(()=>startLis(),500); // auto-retry with Whisper
    return;
  }else if(e.error!=='aborted')showHint('Ошибка: '+e.error);
  isLis=false;stopMic();vOff();if(curState==='listening')setState('idle');
};
recognition.onend=()=>{
  // Never restart mic while Alice is thinking/speaking (echo prevention)
  if(curState==='thinking'||curState==='speaking'||curState==='happy'){isLis=false;return;}
  // If music detected or party mode, keep mic alive + restart recognition
  if((curState==='listening'&&musicDetectTimer>.3)||(curState==='party')){
    try{recognition.start();isLis=true;return;}catch(e){}
  }
  isLis=false;stopMic();vOff();if(curState==='listening')setState('idle');
};}
function loadVoice(){if(!synth)return;const pk=()=>{const v=synth.getVoices();for(const n of['google рус','milena','irina','yandex']){const f=v.find(x=>x.name.toLowerCase().includes(n));if(f){selVoice=f;return;}}selVoice=v.find(x=>x.lang.startsWith('ru'))||null;};pk();synth.onvoiceschanged=pk;}
async function startLis(){if(isSpk&&synth){synth.cancel();isSpk=false;}
if(useWhisperSTT){startWhisperRec();return;}
if(!recognition){showHint('Голос не поддерживается');return;}
try{audioCtx=audioCtx||new(AudioContext||webkitAudioContext)();if(audioCtx.state==='suspended')await audioCtx.resume();micStream=await navigator.mediaDevices.getUserMedia({audio:true});const s=audioCtx.createMediaStreamSource(micStream);analyser=audioCtx.createAnalyser();analyser.fftSize=256;s.connect(analyser);}catch(e){}
try{recognition.start();isLis=true;setState('listening');vOn();showHint('Слушаю...',true);}catch(e){showHint('Не удалось');}}
function stopLis(){if(useWhisperSTT){stopWhisperRec();return;}if(recognition&&isLis)recognition.stop();stopMic();}
function stopMic(){if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}analyser=null;}
function getMicLvl(){if(!analyser)return 0;const d=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(d);let s=0;for(let i=0;i<d.length;i++)s+=d[i];return s/d.length/255;}
function getBassLvl(){if(!analyser)return 0;const d=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(d);let s=0;for(let i=0;i<8;i++)s+=d[i];return s/8/255;}
function stripEmoji(s){return s.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu,'').replace(/\s{2,}/g,' ').trim();}
let useServerTTS=/huawei|harmonyos|hmscore/i.test(navigator.userAgent||'');
function speak(text){
  const cleanText=stripEmoji(text);
  if(!cleanText)return Promise.resolve(speakEnd());
  // Server TTS for devices without browser voices
  if(useServerTTS)return speakServer(cleanText);
  // Try browser TTS
  if(!synth){speakEnd();return Promise.resolve();}
  return new Promise(res=>{
    synth.cancel();
    const u=new SpeechSynthesisUtterance(cleanText);u.lang=VOICE_LANG;u.rate=1.05;u.pitch=1.1;
    if(selVoice)u.voice=selVoice;
    let done=false,started=false,safety=0,startCheck=0;
    const finish=()=>{if(done)return;done=true;clearTimeout(safety);clearTimeout(startCheck);isSpk=false;speakEnd();res();};
    u.onstart=()=>{started=true;isSpk=true;setState('speaking');speakT0=performance.now()/1000;};
    u.onend=finish;u.onerror=finish;
    synth.speak(u);if(synth.paused)synth.resume();
    // If speech doesn't start within 2s, switch to server TTS permanently
    startCheck=setTimeout(()=>{if(!started&&!done){console.warn('[TTS] browser TTS silent, switching to server');synth.cancel();useServerTTS=true;done=true;clearTimeout(safety);speakServer(cleanText).then(res);}},2000);
    safety=setTimeout(()=>{if(!done){synth.cancel();finish();}},15000);
  });
}
function speakServer(text){
  return new Promise(res=>{
    isSpk=true;setState('speaking');speakT0=performance.now()/1000;
    fetch(API+'/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})})
    .then(r=>r.blob()).then(blob=>{
      const url=URL.createObjectURL(blob);const a=new Audio(url);
      a.onended=()=>{URL.revokeObjectURL(url);isSpk=false;speakEnd();res();};
      a.onerror=()=>{URL.revokeObjectURL(url);isSpk=false;speakEnd();res();};
      a.play().catch(()=>{isSpk=false;speakEnd();res();});
    }).catch(()=>{isSpk=false;speakEnd();res();});
  });
}
let replyMood='neutral';
function speakEnd(){
  if(replyMood==='happy'){setState('happy');setTimeout(()=>{if(curState==='happy')setState('idle');},1500);}
  else{setState('idle');}
}
function vOn(){$vBtn.classList.add('active');for(let i=0;i<3;i++){const r=document.createElement('div');r.className='ripple';$vBtn.appendChild(r);}}
function vOff(){$vBtn.classList.remove('active');$vBtn.querySelectorAll('.ripple').forEach(r=>r.remove());}
let hintTm=null;
function showHint(t,b){$hint.textContent=t;$hint.className=b?'bright':'';clearTimeout(hintTm);if(!b)hintTm=setTimeout(()=>{$hint.textContent='Нажми на модель или микрофон';$hint.className='';},4000);}
function addMsg(t,type,autoFade=true){const el=document.createElement('div');el.className='msg '+type;el.textContent=t;$chat.appendChild(el);while($chat.children.length>4)$chat.firstChild.remove();if(autoFade)fadeMsg(el,CHAT_FADE);return el;}
function fadeMsg(el,delay){setTimeout(()=>{if(el.parentElement){el.classList.add('fading');el.addEventListener('animationend',()=>el.remove());}},delay);}
async function handleMsg(text){if(!text)return;addMsg(text,'user');setState('thinking');showHint('Думаю...',true);
  replyMood='neutral';
  // Kill mic so she doesn't hear herself
  if(recognition&&isLis)try{recognition.abort();}catch(e){}
  isLis=false;stopMic();vOff();
  try{
    const r=await fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    const d=await r.json();let reply=d.reply||'Хм...';
    const moodMatch=reply.match(/\[(happy|neutral|sad)\]/);
    if(moodMatch)replyMood=moodMatch[1];
    reply=reply.replace(/\[(happy|neutral|sad)\]/g,'').trim();
    const msgEl=addMsg(reply,'alice',false);showHint('');
    await speak(reply);
    fadeMsg(msgEl,3000);
  }catch(e){addMsg('Сервер недоступен...','alice');setState('idle');showHint('Сервер недоступен');}
}

/* ===== INFO WIDGET (one consolidated panel) ===== */
const $info=document.getElementById('info-widget');
const $statusDot=document.getElementById('status-dot');
let weatherStr='';

function initInfo(){
  updateInfo();fetchWeather();
  setInterval(updateInfo,1000);setInterval(fetchWeather,600000);
}
function updateInfo(){
  const now=new Date();
  const lines=CLOCKS.map(c=>{
    const t=now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',timeZone:c.tz});
    return '<span style="opacity:.5">'+c.label+'<'+'/span> '+t;
  });
  $info.innerHTML=lines.join(' · ')+(weatherStr?'<br>'+weatherStr:'');
}
async function fetchWeather(){try{const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.68&longitude=33.04&current=temperature_2m,weathercode');const d=await r.json();const t=Math.round(d.current.temperature_2m),c=d.current.weathercode;const icon=c===0?'☀️':c<3?'⛅':c<50?'☁️':c<70?'🌧️':'⛈️';weatherStr=`${icon} ${t}°C Limassol`;}catch(e){}}
stLis.push(s=>{const m={idle:'◉ Готова',listening:'◉ Слушаю...',thinking:'◉ Думаю...',speaking:'◉ Говорю...',happy:'◉ ✨',party:'◉ Тусим!'};$statusDot.textContent=m[s]||'◉';musicDetectTimer=0;musicFadeTimer=0;});

/* ===== WHISPER STT FALLBACK (for iPad/Safari/Huawei) ===== */
let useWhisperSTT=false;
let mediaRecorder=null;
let audioChunks=[];
let whisperVAD=null; // VAD interval for auto-stop

async function startWhisperRec(){
  try{
    audioCtx=audioCtx||new(AudioContext||webkitAudioContext)();
    if(audioCtx.state==='suspended')await audioCtx.resume();
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    const src=audioCtx.createMediaStreamSource(micStream);
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;
    src.connect(analyser);
    audioChunks=[];
    mediaRecorder=new MediaRecorder(micStream,{mimeType:MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4'});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=async()=>{
      clearInterval(whisperVAD);whisperVAD=null;
      // If entering party mode, don't process speech
      if(curState==='party'){return;}
      const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType});
      stopMic();vOff();
      if(blob.size<1000){setState('idle');showHint('Не услышала...');return;}
      setState('thinking');showHint('Распознаю...',true);
      try{
        const fd=new FormData();fd.append('audio',blob,'voice.webm');
        const r=await fetch(API+'/api/stt',{method:'POST',body:fd});
        const d=await r.json();
        if(d.text&&d.text.trim())handleMsg(d.text.trim());
        else{setState('idle');showHint('Не разобрала...');}
      }catch(e2){setState('idle');showHint('Ошибка распознавания');}
    };
    mediaRecorder.start();
    isLis=true;setState('listening');vOn();showHint('Слушаю...',true);
    // VAD: auto-detect end of speech by silence
    let speechStarted=false,silenceTime=0;
    whisperVAD=setInterval(()=>{
      if(!analyser||curState==='party')return;
      const lvl=getMicLvl();
      if(lvl>.06){speechStarted=true;silenceTime=0;}
      else if(speechStarted){silenceTime+=100;
        if(silenceTime>=1500){
          // 1.5s silence after speech → auto-stop
          clearInterval(whisperVAD);whisperVAD=null;
          if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();
          isLis=false;
        }
      }
    },100);
  }catch(e3){showHint('Нет доступа к микрофону');}
}

function stopWhisperRec(){
  clearInterval(whisperVAD);whisperVAD=null;
  if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();}
  isLis=false;
}

function initSynthLazy(){if(!synth&&typeof speechSynthesis!=='undefined'){synth=speechSynthesis;loadVoice();}}

/* ===== AVATAR SWITCHER ===== */
const $switcher=document.getElementById('avatar-switcher');
AVATARS.forEach((av,i)=>{
  const btn=document.createElement('div');
  btn.className='av-btn'+(i===0?' active':'');
  btn.textContent=av.icon;
  btn.title=av.name;
  btn.addEventListener('click',()=>switchAvatar(i));
  $switcher.appendChild(btn);
});

function switchAvatar(idx){
  if(idx===currentAvatarIdx||!vrm)return;
  currentAvatarIdx=idx;
  const av=AVATARS[idx];
  // Update active button
  $switcher.querySelectorAll('.av-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  // Show loading
  $load.classList.remove('hidden');$load.innerHTML='Загружаю...';
  // Remove old model
  scene.remove(vrm.scene);vrm=null;
  // Load new
  loader.load(av.url,gltf=>{
    vrm=gltf.userData.vrm;
    vrm.scene.traverse(o=>{o.frustumCulled=false;});
    if(av.flip)vrm.scene.rotation.y=Math.PI;
    scene.add(vrm.scene);
    const headBone=vrm.humanoid.getNormalizedBoneNode('head');
    if(headBone){const hp=new THREE.Vector3();headBone.getWorldPosition(hp);camera.position.set(0,hp.y+0.06,0.65);camera.lookAt(0,hp.y+0.02,0);}
    const lt=new THREE.Object3D();camera.add(lt);if(vrm.lookAt)vrm.lookAt.target=lt;
    applyPortraitOffset();
    $load.classList.add('hidden');
    console.log('[VRM] Switched to',av.id);
  },null,e=>{$load.textContent='Ошибка';console.error(e);});
}

/* ===== EVENTS ===== */
$vBtn.addEventListener('click',e=>{e.preventDefault();initSynthLazy();isLis?stopLis():startLis();});
$avC.style.pointerEvents='auto';
$avC.addEventListener('click',e=>{e.preventDefault();isLis?stopLis():startLis();});
$tIn.addEventListener('keydown',e=>{if(e.key==='Enter'&&$tIn.value.trim()){handleMsg($tIn.value.trim());$tIn.value='';$tIn.blur();}});
$sBtn.addEventListener('click',()=>{if($tIn.value.trim()){handleMsg($tIn.value.trim());$tIn.value='';}});
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  // Adapt FOV: wider on portrait (phone), tighter on landscape (desktop)
  camera.fov=innerHeight>innerWidth?28:22;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);resizeBg();
  applyPortraitOffset();
});
document.addEventListener('dblclick',e=>e.preventDefault());

/* ===== MAIN RENDER LOOP ===== */
function animate(){
  requestAnimationFrame(animate);
  const delta=clock.getDelta();
  const t=clock.elapsedTime;

  // Audio level + music detection
  if(curState==='listening'||curState==='party')tgtAudio=getMicLvl();
  else if(curState==='speaking'){const st=t-speakT0;tgtAudio=Math.max(0,(Math.sin(st*12)*.3+Math.sin(st*7.3)*.2+Math.sin(st*19)*.15+.35)*.65);}
  else tgtAudio=0;
  audioLevel+=(tgtAudio-audioLevel)*.15;

  // Music detection: sustained audio in listening → party mode
  if(curState==='listening'&&audioLevel>.07){musicDetectTimer+=delta;if(musicDetectTimer>2)setState('party');}
  else if(curState==='listening'){musicDetectTimer=Math.max(0,musicDetectTimer-delta*2);}
  if(curState==='party'&&audioLevel<.04){musicFadeTimer+=delta;if(musicFadeTimer>2){if(useWhisperSTT){clearInterval(whisperVAD);whisperVAD=null;if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.onstop=()=>{};mediaRecorder.stop();}}else if(recognition&&isLis)try{recognition.stop();}catch(e){}isLis=false;stopMic();vOff();setState('idle');}}
  else musicFadeTimer=0;

  // Particles
  drawP();

  // 3D Animation
  if(vrm){
    updateAnimTargets(t);
    updateBlink(t,delta);
    applyAnim(delta);
    vrm.update(delta);

    // Override arm pose AFTER vrm.update (prevents T-pose)
    const bones=vrm.humanoid.humanBones;
    const lUA=bones?.leftUpperArm?.node;
    const rUA=bones?.rightUpperArm?.node;
    const lLA=bones?.leftLowerArm?.node;
    const rLA=bones?.rightLowerArm?.node;
    const lH=bones?.leftHand?.node;
    const rH=bones?.rightHand?.node;
    const et=t;
    if(lUA){lUA.rotation.set(0,-0.9,2.2+Math.sin(et*.4)*.015);}
    if(rUA){rUA.rotation.set(0,0.9,-2.2+Math.sin(et*.45)*.015);}
    if(lLA){lLA.rotation.set(0,-0.25,0.05);}
    if(rLA){rLA.rotation.set(0,0.25,-0.05);}
    if(lH){lH.rotation.set(0,0,0.05);}
    if(rH){rH.rotation.set(0,0,-0.05);}
  }

  renderer.render(scene,camera);
}

resizeBg();initP();initRec();loadVoice();initInfo();
(async()=>{try{if('wakeLock' in navigator)await navigator.wakeLock.request('screen');}catch(e){}})();
animate();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
